name: Preview Package Comment

on:
  workflow_run:
    workflows:
      - Preview Package
    types:
      - completed

permissions:
  actions: read
  issues: write

jobs:
  comment:
    if: ${{ github.event.workflow_run.event == 'issue_comment' }}
    runs-on: ubuntu-latest

    steps:
      - name: Comment preview result in PR
        uses: actions/github-script@v8
        with:
          script: |
            const run = context.payload.workflow_run;
            const artifactsResponse = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id
            });

            const artifacts = artifactsResponse.data.artifacts || [];
            const metadataArtifact = artifacts.find((artifact) => /^preview-metadata-pr\d+$/.test(artifact.name));

            if (!metadataArtifact) {
              core.info('No preview metadata artifact found for this run.');
              return;
            }

            const prNumberMatch = metadataArtifact.name.match(/^preview-metadata-pr(\d+)$/);
            if (!prNumberMatch) {
              core.setFailed(`Could not parse PR number from artifact name: ${metadataArtifact.name}`);
              return;
            }

            const prNumber = Number(prNumberMatch[1]);
            const previewArtifact = artifacts.find((artifact) => /^preview-package-pr\d+$/.test(artifact.name));
            const runUrl = run.html_url;

            let body = '';

            if (run.conclusion === 'success' && previewArtifact) {
              const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${run.id}/artifacts/${previewArtifact.id}`;
              body = [
                `Preview package is ready for PR #${prNumber}.`,
                '',
                `ZIP artifact: ${artifactUrl}`,
                `Workflow run: ${runUrl}`,
                '',
                'This preview package is built from the current PR branch and is not published to GitHub Releases.'
              ].join('\n');
            } else if (run.conclusion === 'failure') {
              body = [
                `Preview package build failed for PR #${prNumber}.`,
                '',
                `Workflow run: ${runUrl}`
              ].join('\n');
            } else {
              core.info(`Skipping comment for workflow conclusion: ${run.conclusion}`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });
