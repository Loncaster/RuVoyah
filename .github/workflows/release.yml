name: Stable Release

on:
  push:
    branches:
      - main
    paths:
      - "translations/**"
      - "source code/**"
      - "scripts/translation-tools.ps1"
      - "scripts/sync-translations.ps1"
      - "scripts/build-overlay.ps1"
      - "scripts/build-all-overlays.ps1"
      - "scripts/get-release-version.ps1"
      - "scripts/package-release.ps1"
      - "install_win.bat"
      - "install_mac.sh"
      - "uninstall_win.bat"
      - "uninstall_mac.sh"
      - "disable-verity_win.bat"
      - "disable-verity_mac.sh"
      - "adb"
      - "adb.exe"
      - "AdbWinApi.dll"
      - "AdbWinUsbApi.dll"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Fetch tags
        shell: pwsh
        run: git fetch --tags --force

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $releaseInfo = ./scripts/get-release-version.ps1 | ConvertFrom-Json
          "value=$($releaseInfo.version)" >> $env:GITHUB_OUTPUT
          "tag=$($releaseInfo.release_tag)" >> $env:GITHUB_OUTPUT
          "release_name=$($releaseInfo.release_name)" >> $env:GITHUB_OUTPUT

      - name: Build overlays
        shell: pwsh
        run: ./scripts/build-all-overlays.ps1

      - name: Package stable archive
        shell: pwsh
        run: ./scripts/package-release.ps1 -OutputRoot "$env:RUNNER_TEMP\out" -Version "${{ steps.version.outputs.value }}" -Channel stable

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          generate_release_notes: true
          files: ${{ runner.temp }}/out/*.zip
