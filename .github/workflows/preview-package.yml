name: Preview Package

on:
  issue_comment:
    types:
      - created

concurrency:
  group: preview-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  prepare:
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      command_matched: ${{ steps.pr.outputs.command_matched }}
      allowed: ${{ steps.pr.outputs.allowed }}
      skip_reason: ${{ steps.pr.outputs.skip_reason }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      head_repo: ${{ steps.pr.outputs.head_repo }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      pr_author: ${{ steps.pr.outputs.pr_author }}

    steps:
      - name: Read PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = (context.payload.comment.body || '').trim();
            const prNumber = context.payload.issue.number;
            const actor = context.payload.comment.user.login;
            const repoOwner = context.repo.owner;

            core.setOutput('command_matched', String(commentBody === '/build'));

            if (commentBody !== '/build') {
              core.setOutput('allowed', 'false');
              core.setOutput('skip_reason', '');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const allowed = actor === pr.user.login || actor === repoOwner;

            core.setOutput('allowed', String(allowed));
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('pr_author', pr.user.login);
            core.setOutput(
              'skip_reason',
              allowed
                ? ''
                : `Preview build can only be requested by @${pr.user.login} or @${repoOwner}.`
            );

  build:
    needs: prepare
    if: ${{ needs.prepare.outputs.command_matched == 'true' && needs.prepare.outputs.allowed == 'true' }}
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.head_repo }}
          ref: ${{ needs.prepare.outputs.head_ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build overlays
        shell: pwsh
        run: ./scripts/build-all-overlays.ps1

      - name: Package preview archive
        shell: pwsh
        run: >
          ./scripts/package-release.ps1
          -OutputRoot "$env:RUNNER_TEMP\out"
          -Version "preview-pr${{ needs.prepare.outputs.pr_number }}-${{ github.run_number }}"
          -Channel preview

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-package-pr${{ needs.prepare.outputs.pr_number }}
          path: ${{ runner.temp }}/out/*.zip
          retention-days: 14

  report:
    needs:
      - prepare
      - build
    if: ${{ always() && needs.prepare.outputs.command_matched == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          PR_AUTHOR: ${{ needs.prepare.outputs.pr_author }}
          SKIP_REASON: ${{ needs.prepare.outputs.skip_reason }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER || context.payload.issue.number);
            const buildResult = process.env.BUILD_RESULT || 'skipped';
            const runUrl = process.env.RUN_URL;
            const skipReason = process.env.SKIP_REASON || '';
            const prAuthor = process.env.PR_AUTHOR || 'PR author';

            let body = '';

            if (skipReason) {
              body = `${skipReason}\n\nIf you are the PR author, use the \`/build\` command in this PR to start a preview package build.`;
            } else if (buildResult === 'success') {
              body = [
                `Preview package for PR #${prNumber} is ready.`,
                '',
                `Open the workflow run to download the artifact: ${runUrl}`,
                '',
                `The archive is built from the current PR branch and is not published to GitHub Releases.`
              ].join('\n');
            } else if (buildResult === 'failure') {
              body = [
                `Preview package build for PR #${prNumber} failed.`,
                '',
                `Open the workflow run for details: ${runUrl}`
              ].join('\n');
            } else {
              body = [
                `Preview package build for PR #${prNumber} was not started.`,
                '',
                `Only @${prAuthor} or @${context.repo.owner} can start it with the \`/build\` command.`
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });
