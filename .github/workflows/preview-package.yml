name: Preview Package

on:
  workflow_dispatch:

jobs:
  preview:
    if: ${{ github.event.repository.fork == true }}
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build overlays
        shell: pwsh
        run: ./scripts/build-all-overlays.ps1

      - name: Package preview archive
        shell: pwsh
        run: ./scripts/package-release.ps1 -OutputRoot "$env:RUNNER_TEMP\out" -Version "preview-${{ github.run_number }}" -Channel preview

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-package
          path: ${{ runner.temp }}/out/*.zip

  skipped-in-main-repo:
    if: ${{ github.event.repository.fork != true }}
    runs-on: ubuntu-latest

    steps:
      - name: Explain fork-only behavior
        run: echo "Preview packages are intended for contributor forks only."
